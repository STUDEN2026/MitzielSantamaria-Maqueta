<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clínica 3D Interactiva</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;overflow:hidden;font-family:'Segoe UI',sans-serif}
#c{display:block;width:100vw;height:100vh}
#ui{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:14px 18px;pointer-events:none;z-index:10}
.card{background:rgba(10,14,20,0.88);border:1px solid rgba(255,255,255,0.13);border-radius:10px;padding:11px 16px;backdrop-filter:blur(12px)}
.card h1{font-size:13px;font-weight:700;color:#e6edf3;letter-spacing:2.5px;text-transform:uppercase}
.card p{font-size:9.5px;color:#7d8590;margin-top:2px;letter-spacing:1px}
.ctrl{pointer-events:all}
.ctrl h3{font-size:8.5px;color:#7d8590;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px}
.cr{display:flex;align-items:center;gap:7px;margin-bottom:4px;font-size:9.5px;color:#e6edf3}
kbd{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:4px;padding:1px 5px;font-size:8.5px;color:#adb5bd}
#btns{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10;flex-wrap:wrap;justify-content:center}
.vb{background:rgba(10,14,20,0.88);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:7px 15px;font-size:10.5px;color:#e6edf3;cursor:pointer;letter-spacing:1px;text-transform:uppercase;backdrop-filter:blur(10px);transition:all .18s}
.vb:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.3)}
.vb.on{background:rgba(59,130,246,0.3);border-color:#3b82f6;color:#93c5fd}
#ld{position:fixed;inset:0;background:#0d1117;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
#ld h2{color:#e6edf3;font-size:15px;letter-spacing:3px;text-transform:uppercase;margin-bottom:18px}
.lb{width:220px;height:2px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
.lf{height:100%;background:#3b82f6;border-radius:2px;animation:lda 2.4s ease forwards}
@keyframes lda{from{width:0}to{width:100%}}
#info{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);background:rgba(10,14,20,0.88);border:1px solid rgba(59,130,246,0.4);border-radius:8px;padding:6px 14px;font-size:10px;color:#93c5fd;letter-spacing:1px;z-index:10;pointer-events:none;opacity:0;transition:opacity .3s}
</style>
</head>
<body>
<div id="ld"><h2>⚕ Construyendo Clínica 3D</h2><div class="lb"><div class="lf"></div></div></div>
<canvas id="c"></canvas>
<div id="ui">
  <div class="card"><h1>⚕ Clínica de Salud</h1><p>MAQUETA 3D INTERACTIVA — VISTA COMPLETA</p></div>
  <div class="card ctrl">
    <h3>Navegación</h3>
    <div class="cr"><kbd>Arrastrar</kbd>Rotar</div>
    <div class="cr"><kbd>Scroll</kbd>Zoom</div>
    <div class="cr"><kbd>Der+drag</kbd>Desplazar</div>
  </div>
</div>
<div id="btns">
  <button class="vb on" onclick="setView('iso',this)">Isométrico</button>
  <button class="vb" onclick="setView('top',this)">Planta</button>
  <button class="vb" onclick="setView('fr',this)">Frente</button>
  <button class="vb" onclick="setView('sd',this)">Lateral</button>
  <button class="vb" id="roofBtn" onclick="toggleRoof()">Techo OFF</button>
</div>
<div id="info"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0d1117);
scene.fog=new THREE.Fog(0x0d1117,50,90);

const camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,0.1,200);
camera.position.set(20,18,20);

const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;

// ── LIGHTS ─────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xfff5e8,0.7));

const sun=new THREE.DirectionalLight(0xfffde8,1.5);
sun.position.set(14,24,12);
sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-25;sun.shadow.camera.right=25;
sun.shadow.camera.top=25;sun.shadow.camera.bottom=-25;
sun.shadow.camera.far=80;sun.shadow.bias=-0.001;
scene.add(sun);

// ── BUG FIX: use .set() instead of Object.assign for position ──────────────
const dl2=new THREE.DirectionalLight(0xd0e8ff,0.5);
dl2.position.set(-10,8,-8);
scene.add(dl2);

const pt1=new THREE.PointLight(0x6699ff,0.9,14);pt1.position.set(-6,3.5,6);scene.add(pt1);
const pt2=new THREE.PointLight(0x44ffaa,0.5,10);pt2.position.set(4,3.5,-2);scene.add(pt2);
const pt3=new THREE.PointLight(0xffcc88,0.4,8);pt3.position.set(0,3.0,2.5);scene.add(pt3);

// ── MATERIALS ──────────────────────────────────────────────────────────────
const M=(col,em,tr,op,side)=>{
  const m=new THREE.MeshLambertMaterial({
    color:col,
    transparent:!!(tr||op<1),
    opacity:op==null?1:op,
    side:side||THREE.FrontSide
  });
  if(em)m.emissive=new THREE.Color(em);
  return m;
};
const mFloor  =M(0x7ec8e3);
const mFloor2 =M(0x5ab8d3);  // alternate tile
const mWall   =M(0xf2ede0);
const mWallI  =M(0xeae4d5);
const mCeil   =M(0xfbf8f0);
const mRoof   =M(0xddcfb0,null,true,0.15,THREE.DoubleSide);
const mDesk   =M(0x7a5020);
const mDeskTop=M(0x9c6828);
const mBed    =M(0xe2d0aa);
const mBedF   =M(0xd4c090);
const mBedBlue=M(0xb8d4f0);  // blue exam bed sheet
const mPillow =M(0xfffaf0);
const mChair  =M(0x4a90d9);
const mChairB =M(0x2a60a9);
const mLeg    =M(0x999999);
const mCab    =M(0xc8b890);
const mCabD   =M(0xb0a070);
const mMon    =M(0x1a1a1a);
const mScr    =M(0x55cc88,0x112200);
const mScrBlue=M(0x4488ff,0x001144);
const mWin    =M(0x88c4e8,null,true,0.45,THREE.DoubleSide);
const mDoor   =M(0xa07840,null,true,0.6,THREE.DoubleSide);
const mDoorF  =M(0x8a6020,null,true,0.5,THREE.DoubleSide);
const mCross  =M(0xe74c3c,0x550000);
const mToilet =M(0xf5f0e8);
const mSink   =M(0xe8e4d8);
const mRecep  =M(0x8B5E1A);
const mRecepT =M(0x6b4010);
const mScale  =M(0xd8d8d8);
const mPole   =M(0xbbbbbb);
const mIV     =M(0xcccccc);
const mIVbag  =M(0xaaddff,null,true,0.7);
const mToy    =M(0x33aa44,0x003300);
const mToyR   =M(0xee4422,0x330000);
const mToyY   =M(0xeecc00,0x221100);
const mWait   =M(0x3a7fd4);
const mWaitB  =M(0x2a5a9a);
const mShelf  =M(0xddccaa);
const mMed1   =M(0xff6677,null,true,0.88);
const mMed2   =M(0x77bbff,null,true,0.88);
const mMed3   =M(0xffcc44,null,true,0.88);
const mMed4   =M(0xaaffaa,null,true,0.88);
const mMed5   =M(0xff99cc,null,true,0.88);
const mMed6   =M(0xcc88ff,null,true,0.88);
const pMats=[M(0xf08080),M(0x80c0f0),M(0x80f080),M(0xf0f080),M(0xf0c080),M(0xc080f0),
             M(0xf080c0),M(0x80f0c0),M(0xffaa55),M(0x55aaff),M(0xaaffaa),M(0xffaaff)];
const mWainscot=M(0xe0d8c8);  // lower wall accent
const mBaseboard=M(0xd5cdb8);

// ── HELPERS ────────────────────────────────────────────────────────────────
const add=m=>{m.castShadow=true;m.receiveShadow=true;scene.add(m);return m;};
const box=(w,h,d,mat,x,y,z,ry=0)=>{
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z);if(ry)m.rotation.y=ry;return add(m);
};
const cyl=(rt,rb,h,mat,x,y,z,seg=16)=>{
  const m=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg),mat);
  m.position.set(x,y,z);return add(m);
};
const sph=(r,mat,x,y,z,seg=12)=>{
  const m=new THREE.Mesh(new THREE.SphereGeometry(r,seg,seg),mat);
  m.position.set(x,y,z);return add(m);
};
function light2(x,z){
  box(0.55,0.05,0.55,M(0xffffcc,0x888855),x,3.17,z);
  const p=new THREE.PointLight(0xfffde8,0.32,5.5);p.position.set(x,3.0,z);scene.add(p);
}

// Room: 10m wide (x: -5→5), 7m deep (z: -3.5→3.5), 3.2m tall
const WH=3.2,WT=0.16;

// ── FLOOR ──────────────────────────────────────────────────────────────────
box(10,0.1,7,mFloor,0,0,0);
// Checkerboard-ish tile grid
const tl=new THREE.LineBasicMaterial({color:0x5ab0ca,opacity:0.3,transparent:true});
for(let x=-4.8;x<=4.8;x+=0.6){
  const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x,0.056,-3.5),new THREE.Vector3(x,0.056,3.5)]);
  scene.add(new THREE.Line(g,tl));
}
for(let z=-3.5;z<=3.5;z+=0.6){
  const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-5,0.056,z),new THREE.Vector3(5,0.056,z)]);
  scene.add(new THREE.Line(g,tl));
}

// ── BASEBOARDS ─────────────────────────────────────────────────────────────
box(10,0.08,0.04,mBaseboard,0,0.04,-3.5);
box(10,0.08,0.04,mBaseboard,0,0.04,3.5);
box(0.04,0.08,7,mBaseboard,-5,0.04,0);
box(0.04,0.08,7,mBaseboard,5,0.04,0);

// ── OUTER WALLS ────────────────────────────────────────────────────────────
box(3.2,WH,WT,mWall,-3.4,WH/2,3.5+WT/2);   // front left
box(3.2,WH,WT,mWall, 3.4,WH/2,3.5+WT/2);   // front right
box(10,0.5,WT,mWall,0,WH-0.25,3.5+WT/2);   // lintel
box(10,WH,WT,mWall,0,WH/2,-3.5-WT/2);      // back
box(WT,WH,7,mWall,-5-WT/2,WH/2,0);         // left
box(WT,WH,7,mWall, 5+WT/2,WH/2,0);         // right
// Wainscot (lower wall decor strip ~0.9m)
box(10,0.04,0.03,mWainscot,0,0.9,-3.48);
box(10,0.04,0.03,mWainscot,0,0.9, 3.48);
box(0.03,0.04,7,mWainscot,-4.98,0.9,0);
box(0.03,0.04,7,mWainscot, 4.98,0.9,0);

// ── INTERNAL WALL (nurse divider) ──────────────────────────────────────────
box(WT,WH,3.8,mWallI,0.1,WH/2,-1.6);

// ── BATHROOM WALLS ─────────────────────────────────────────────────────────
box(1.6,WH,WT,mWallI,-4.2,WH/2,1.0);
box(WT,WH,2.5,mWallI,-3.4,WH/2,2.25);
box(1.6,WH,WT,mWallI, 4.2,WH/2,1.0);
box(WT,WH,2.5,mWallI, 3.4,WH/2,2.25);

// ── CEILING & ROOF ─────────────────────────────────────────────────────────
const ceilMesh=box(10,0.1,7,mCeil,0,WH+0.05,0);
const roofG=new THREE.Group();
const rm=new THREE.Mesh(new THREE.BoxGeometry(10.5,0.14,7.5),mRoof);
rm.position.set(0,WH+0.18,0);
roofG.add(rm);
scene.add(roofG);

// ── CEILING LIGHTS ─────────────────────────────────────────────────────────
light2(-2.5,-2.5);light2(-2.5,0);
light2(2.5,-2.5);light2(2.5,0);
light2(0,2.2);light2(-2.5,2.2);light2(2.5,2.2);

// ── WINDOWS (back wall) ────────────────────────────────────────────────────
box(1.2,1.0,0.05,mWin,-3.2,WH-0.9,-3.5);
box(1.4,0.06,0.18,mCab,-3.2,WH-0.42,-3.5);
box(1.2,1.0,0.05,mWin, 3.2,WH-0.9,-3.5);
box(1.4,0.06,0.18,mCab, 3.2,WH-0.42,-3.5);
// Window frames
box(0.04,1.04,0.06,M(0xccbbaa),-3.2,WH-0.9,-3.5);
box(0.04,1.04,0.06,M(0xccbbaa), 3.2,WH-0.9,-3.5);
// Side windows on left wall
box(0.05,0.9,1.1,mWin,-5,WH-1.0,-2.6);
box(0.05,0.9,0.9,mWin,-5,WH-1.0, 1.8);
// Sill
box(0.2,0.06,1.15,mCab,-4.94,WH-0.57,-2.6);
box(0.2,0.06,0.95,mCab,-4.94,WH-0.57, 1.8);

// ── DOOR (front, double) ───────────────────────────────────────────────────
box(1.45,2.4,0.05,mDoor,-0.75,1.2,3.54);
box(1.45,2.4,0.05,mDoor, 0.75,1.2,3.54);
// Door handles
box(0.04,0.04,0.12,M(0xddbb44),-0.08,1.15,3.56);
box(0.04,0.04,0.12,M(0xddbb44), 0.08,1.15,3.56);
// Door frame
box(3.1,0.08,0.1,M(0xc8b080),0,2.42,3.54);
box(0.08,2.44,0.1,M(0xc8b080),-1.5,1.2,3.54);
box(0.08,2.44,0.1,M(0xc8b080), 1.5,1.2,3.54);

// ── MEDICAL CROSS (left front wall) ────────────────────────────────────────
box(0.14,0.52,0.08,mCross,-4.4,2.15,-3.48);
box(0.52,0.14,0.08,mCross,-4.4,2.15,-3.48);
// Cross backplate glow
box(0.65,0.65,0.06,M(0xffffff,0x111111,true,0.12),-4.4,2.15,-3.46);

// ── ZONE FLOOR OVERLAYS ────────────────────────────────────────────────────
const zn=(w,d,col,x,z,op=0.12)=>{
  const m=new THREE.Mesh(new THREE.PlaneGeometry(w,d),M(col,null,true,op));
  m.rotation.x=-Math.PI/2;m.position.set(x,0.057,z);scene.add(m);
};
zn(4.8,3.2,0x4a90d9,-2.5,-1.8);
zn(4.7,3.2,0x27ae60, 2.7,-1.8);
zn(2.4,2.0,0x8e44ad, 1.2, 1.4);
zn(5.0,1.8,0xe67e22, 0.0, 2.4);

// ═══════════════════════════════════════════════════════════════════════════
// ÁREA 1: ENFERMERÍA (left side, -5 to 0, z: -3.5 to 0.5)
// ═══════════════════════════════════════════════════════════════════════════

// L-shaped desk
box(2.4,0.08,0.7,mDeskTop,-3.2,0.82,-2.4);
box(0.7,0.08,1.3,mDeskTop,-4.35,0.82,-1.9);
box(2.4,0.78,0.06,mDesk,-3.2,0.43,-2.06);
box(0.06,0.78,1.3,mDesk,-4.0,0.43,-1.9);
[[-4.1,-2.08],[-4.1,-1.26],[-2.12,-2.08],[-2.12,-2.72]].forEach(([x,z])=>box(0.06,0.8,0.06,mLeg,x,0.42,z));

// Monitor on nurse desk
box(0.5,0.32,0.04,mMon,-3.0,1.06,-2.4);
box(0.46,0.28,0.03,mScrBlue,-3.0,1.06,-2.37);
box(0.05,0.18,0.05,mMon,-3.0,0.92,-2.26);
box(0.22,0.03,0.18,mMon,-3.0,0.84,-2.26);
// Keyboard
box(0.32,0.02,0.12,M(0x333333),-3.0,0.84,-2.16);

// Desk items: phone, clipboard, pen cup
box(0.12,0.05,0.2,M(0x222222),-3.45,0.85,-2.1);  // phone
box(0.22,0.015,0.28,M(0xdddddd),-3.68,0.83,-2.36); // clipboard
cyl(0.05,0.05,0.1,M(0xcc8844),-3.8,0.87,-2.15,8);  // pen cup

// 2 visitor chairs facing desk
function visitChair(x,z,ry=0){
  box(0.45,0.05,0.45,mChair,x,0.48,z,ry);
  box(0.45,0.5,0.05,mChairB,x,0.72,z+(ry===0?0.22:-0.22),ry);
  [[-0.18,0.18],[0.18,0.18],[-0.18,-0.18],[0.18,-0.18]].forEach(([dx,dz])=>box(0.04,0.46,0.04,mLeg,x+dx*Math.cos(ry)-dz*Math.sin(ry),0.25,z+dx*Math.sin(ry)+dz*Math.cos(ry)));
}
visitChair(-2.7,-1.9,0);
visitChair(-2.1,-1.9,0);

// Nurse rolling chair
box(0.44,0.05,0.44,mWait,-3.6,0.54,-1.55);
box(0.44,0.45,0.05,mWaitB,-3.6,0.74,-1.34);
cyl(0.04,0.04,0.48,mLeg,-3.6,0.27,-1.55);
cyl(0.08,0.08,0.04,mLeg,-3.6,0.04,-1.55);

// Medical examination bed (nursing)
box(1.85,0.1,0.8,mBedF,-3.3,0.74,-0.65);
box(1.85,0.08,0.8,mBed,-3.3,0.66,-0.65);
[[-4.1,-1.0],[-4.1,-0.3],[-2.55,-1.0],[-2.55,-0.3]].forEach(([x,z])=>box(0.06,0.6,0.06,mLeg,x,0.33,z));
box(0.42,0.08,0.72,mPillow,-4.08,0.8,-0.65);
// Bed side rail
box(1.2,0.06,0.02,M(0xaaaaaa),-3.25,0.85,-1.05);

// Patient on bed (abstract figure)
box(0.28,0.12,0.64,M(0xf5dfc8),-3.35,0.82,-0.6);  // body
sph(0.13,M(0xf5dfc8),-3.9,0.88,-0.65);              // head
box(0.24,0.06,0.2,M(0x4488cc),-3.35,0.84,-0.62);    // patient gown

// LEFT WALL: Medical supply shelving
box(0.14,2.1,1.9,mShelf,-4.93,1.05,-0.05);
[-0.3,0.3,0.9,1.5].forEach(sy=>box(0.12,0.025,1.8,mShelf,-4.88,sy,-0.05));
const medPos=[
  [-4.88,0.0,-0.7,mMed1],[-4.88,0.0,-0.4,mMed2],[-4.88,0.0,-0.1,mMed3],[-4.88,0.0,0.2,mMed4],[-4.88,0.0,0.5,mMed5],[-4.88,0.0,0.8,mMed1],
  [-4.88,0.6,-0.7,mMed2],[-4.88,0.6,-0.4,mMed3],[-4.88,0.6,-0.1,mMed1],[-4.88,0.6,0.2,mMed2],[-4.88,0.6,0.5,mMed4],[-4.88,0.6,0.8,mMed6],
  [-4.88,1.2,-0.6,mMed3],[-4.88,1.2,-0.2,mMed1],[-4.88,1.2,0.2,mMed4],[-4.88,1.2,0.5,mMed2],[-4.88,1.2,0.8,mMed5],
  [-4.88,1.7,-0.5,mMed1],[-4.88,1.7,-0.1,mMed3],[-4.88,1.7,0.3,mMed2],[-4.88,1.7,0.7,mMed6],
];
medPos.forEach(([x,y,z,mat])=>box(0.08,0.16,0.09,mat,x,y+0.1,z));
[[-4.88,0.0,0.8],[-4.88,0.6,0.8],[-4.88,1.2,0.8]].forEach(([x,y,z])=>cyl(0.04,0.04,0.22,mIVbag,x,y+0.13,z,8));

// IV Pole (near bed)
cyl(0.025,0.025,2.0,mIV,-4.6,1.1,-0.1);
cyl(0.15,0.15,0.03,mIV,-4.6,0.12,-0.1);
[0,1,2,3].forEach(i=>{const a=i*Math.PI/2;box(0.4,0.02,0.04,mIV,-4.6,0.04,-0.1,a);});
sph(0.09,mIVbag,-4.52,2.08,-0.04);
sph(0.09,mIVbag,-4.68,2.06,-0.16);
box(0.22,0.04,0.04,mIV,-4.6,2.12,-0.1);
// IV tubing
cyl(0.01,0.01,0.5,M(0xaaddff,null,true,0.7),-4.55,1.83,-0.08);

// Medical rolling cart
box(0.45,0.6,0.35,mCab,-3.55,0.34,-2.0);
box(0.45,0.03,0.35,mCabD,-3.55,0.65,-2.0);
box(0.45,0.03,0.35,mCabD,-3.55,0.35,-2.0);

// ── SIGNAGE / LABELS (canvas textures) ────────────────────────────────────
function label(text,col,x,z,w=2.2,fontSize=34,opacity=0.95){
  const cv=document.createElement('canvas');cv.width=512;cv.height=128;
  const ctx=cv.getContext('2d');
  // fallback for older browsers without roundRect
  if(ctx.roundRect){
    ctx.fillStyle='rgba(8,14,24,0.88)';
    ctx.beginPath();ctx.roundRect(3,3,506,122,14);ctx.fill();
    ctx.strokeStyle=col;ctx.lineWidth=2.5;
    ctx.beginPath();ctx.roundRect(3,3,506,122,14);ctx.stroke();
  } else {
    ctx.fillStyle='rgba(8,14,24,0.88)';ctx.fillRect(3,3,506,122);
    ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.strokeRect(3,3,506,122);
  }
  ctx.fillStyle=col;
  ctx.font=`700 ${fontSize}px Segoe UI,Arial,sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(text,256,64);
  const tex=new THREE.CanvasTexture(cv);
  const m=new THREE.Mesh(
    new THREE.PlaneGeometry(w,w*0.25),
    new THREE.MeshBasicMaterial({map:tex,transparent:true,depthWrite:false,side:THREE.DoubleSide})
  );
  m.rotation.x=-Math.PI/2;m.position.set(x,0.059,z);scene.add(m);
}

// ── CAMERA CONTROL ─────────────────────────────────────────────────────────
let drag=false,rDrag=false,px=0,py=0;
let theta=Math.PI/4,phi=1.02,radius=26,panX=0,panZ=0;
let tTheta=theta,tPhi=phi,tRadius=radius,tPanX=0,tPanZ=0;

const cvs=document.getElementById('c');
cvs.addEventListener('mousedown',e=>{drag=true;rDrag=e.button===2;px=e.clientX;py=e.clientY;});
cvs.addEventListener('contextmenu',e=>e.preventDefault());
window.addEventListener('mouseup',()=>drag=false);
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  const dx=e.clientX-px,dy=e.clientY-py;
  if(rDrag){panX-=dx*0.018;panZ-=dy*0.018;}
  else{theta-=dx*0.007;phi=Math.max(0.12,Math.min(1.52,phi-dy*0.006));}
  px=e.clientX;py=e.clientY;
  tTheta=theta;tPhi=phi;tPanX=panX;tPanZ=panZ;
});
cvs.addEventListener('wheel',e=>{radius=Math.max(5,Math.min(48,radius+e.deltaY*0.04));tRadius=radius;});
// Touch
let pt0=0;
cvs.addEventListener('touchstart',e=>{
  if(e.touches.length===1){drag=true;px=e.touches[0].clientX;py=e.touches[0].clientY;}
  if(e.touches.length===2){pt0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
});
cvs.addEventListener('touchend',()=>drag=false);
cvs.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&drag){
    const dx=e.touches[0].clientX-px,dy=e.touches[0].clientY-py;
    theta-=dx*0.009;phi=Math.max(0.12,Math.min(1.52,phi-dy*0.007));
    px=e.touches[0].clientX;py=e.touches[0].clientY;
    tTheta=theta;tPhi=phi;
  }
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    radius=Math.max(5,Math.min(48,radius-(d-pt0)*0.1));
    tRadius=radius;pt0=d;
  }
},{passive:false});

const viewPresets={iso:[Math.PI/4,1.0,26,0,0],top:[0,0.08,28,0,0],fr:[0,0.55,22,0,0],sd:[Math.PI/2,0.55,22,0,0]};

// ── ANIMATION ──────────────────────────────────────────────────────────────
let t=0;
function animate(){
  requestAnimationFrame(animate);
  t+=0.016;
  // subtle monitor screen flicker
  if(mScr.emissive) mScr.emissive.setHex(0x112200+(Math.sin(t*2)>0.98?0x010100:0));
  theta+=(tTheta-theta)*0.1;
  phi+=(tPhi-phi)*0.1;
  radius+=(tRadius-radius)*0.1;
  panX+=(tPanX-panX)*0.1;
  panZ+=(tPanZ-panZ)*0.1;
  camera.position.x=panX+radius*Math.sin(theta)*Math.sin(phi);
  camera.position.y=radius*Math.cos(phi);
  camera.position.z=panZ+radius*Math.cos(theta)*Math.sin(phi);
  camera.lookAt(panX,1.2,panZ);
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
