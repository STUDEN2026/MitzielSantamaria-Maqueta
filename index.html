<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clínica Pediátrica 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080d14;overflow:hidden;font-family:'Segoe UI',sans-serif}
#c{display:block;width:100vw;height:100vh}
#ui{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:14px 18px;pointer-events:none;z-index:10}
.card{background:rgba(6,10,18,0.93);border:1px solid rgba(255,255,255,0.13);border-radius:12px;padding:10px 16px;backdrop-filter:blur(14px)}
.card h1{font-size:13px;font-weight:800;color:#fff;letter-spacing:2px;text-transform:uppercase}
.card h1 em{color:#ff6b9d;font-style:normal}
.card p{font-size:9px;color:#6d7580;margin-top:2px;letter-spacing:1.5px}
.ctrl{pointer-events:all}
.ctrl h3{font-size:8px;color:#6d7580;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px}
.cr{display:flex;align-items:center;gap:7px;margin-bottom:4px;font-size:9px;color:#e0e8f0}
kbd{background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.18);border-radius:4px;padding:1px 5px;font-size:8px;color:#adb5bd}
#btns{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10;flex-wrap:wrap;justify-content:center}
.vb{background:rgba(6,10,18,0.93);border:1px solid rgba(255,255,255,0.14);border-radius:8px;padding:7px 14px;font-size:10px;color:#e0e8f0;cursor:pointer;letter-spacing:1px;text-transform:uppercase;backdrop-filter:blur(10px);transition:all .2s}
.vb:hover{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.28)}
.vb.on{background:rgba(255,107,157,0.25);border-color:#ff6b9d;color:#ff6b9d}
#ld{position:fixed;inset:0;background:#080d14;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
#ld .em{font-size:48px;margin-bottom:14px;animation:bob 1.2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
#ld h2{color:#fff;font-size:14px;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
#ld p{color:#6d7580;font-size:9.5px;letter-spacing:2px;margin-bottom:22px}
.lb{width:260px;height:3px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
.lf{height:100%;background:linear-gradient(90deg,#ff6b9d,#4ecdc4,#ffd43b,#74b9ff);border-radius:3px;animation:lda 3.2s ease forwards}
@keyframes lda{from{width:0}to{width:100%}}
</style>
</head>
<body>
<div id="ld">
  <div class="em">🏥</div>
  <h2>Clínica Pediátrica 3D</h2>
  <p>CONSTRUYENDO ESCENA — ESPERE UN MOMENTO...</p>
  <div class="lb"><div class="lf"></div></div>
</div>
<canvas id="c"></canvas>
<div id="ui">
  <div class="card"><h1>🏥 Clínica <em>Pediátrica</em></h1><p>MAQUETA 3D INTERACTIVA — INSTRUMENTOS COMPLETOS</p></div>
  <div class="card ctrl">
    <h3>Navegación</h3>
    <div class="cr"><kbd>Arrastrar</kbd>Rotar</div>
    <div class="cr"><kbd>Scroll</kbd>Zoom</div>
    <div class="cr"><kbd>Der+drag</kbd>Mover</div>
  </div>
</div>
<div id="btns">
  <button class="vb on"  onclick="setView('iso',this)">Isométrico</button>
  <button class="vb"     onclick="setView('top',this)">Planta</button>
  <button class="vb"     onclick="setView('fr',this)">Frente</button>
  <button class="vb"     onclick="setView('sd',this)">Lateral</button>
  <button class="vb"     onclick="setView('enf',this)">Enfermería</button>
  <button class="vb"     onclick="setView('eval',this)">Evaluación</button>
  <button class="vb" id="roofBtn" onclick="toggleRoof()">Techo OFF</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ════════════════════════════════════════════════════════════
//  SCENE SETUP
// ════════════════════════════════════════════════════════════
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x080d14);
scene.fog = new THREE.Fog(0x080d14, 52, 95);

const camera = new THREE.PerspectiveCamera(40, innerWidth/innerHeight, 0.1, 200);
camera.position.set(22, 20, 22);

const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('c'), antialias: true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.25;

// ── LIGHTS ──────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xfff8f2, 0.9));
const sun = new THREE.DirectionalLight(0xfffef0, 1.55);
sun.position.set(18, 28, 14);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -28; sun.shadow.camera.right = 28;
sun.shadow.camera.top  =  28; sun.shadow.camera.bottom = -28;
sun.shadow.camera.far  = 90;  sun.shadow.bias = -0.001;
scene.add(sun);
const dl2 = new THREE.DirectionalLight(0xc8e0ff, 0.55);
dl2.position.set(-14, 10, -10); scene.add(dl2);

// Zone accent lights
const ptL = new THREE.PointLight(0xaaccff, 0.6, 14); ptL.position.set(-3.5, 3.5,  4); scene.add(ptL);
const ptR = new THREE.PointLight(0xaaffcc, 0.5, 12); ptR.position.set( 3.5, 3.5, -2); scene.add(ptR);
const ptC = new THREE.PointLight(0xffee88, 0.45, 10); ptC.position.set(0, 3.0, 2); scene.add(ptC);

// ── MATERIAL FACTORY ────────────────────────────────────────
const M = (col, em, op, side) => {
  const m = new THREE.MeshLambertMaterial({
    color: col,
    transparent: op != null && op < 1,
    opacity: op != null ? op : 1,
    side: side || THREE.FrontSide
  });
  if (em) m.emissive = new THREE.Color(em);
  return m;
};

// Structure
const mFloor   = M(0xf2faff);
const mWall    = M(0xfff8f8);
const mWallI   = M(0xfff0f8);
const mCeil    = M(0xfffcfc);
const mRoof    = M(0xffccdd, null, 0.14, THREE.DoubleSide);
const mBase    = M(0xffb3cc); // baseboard pink

// Furniture / wood
const mDesk    = M(0x8B6014);
const mDeskTop = M(0xd4972a);
const mLeg     = M(0xb0b0b0);
const mCab     = M(0xf0ddb0);
const mCabD    = M(0xd8c090);
const mShelf   = M(0xffd8a8);
const mRecep   = M(0xa06820);
const mRecepT  = M(0x7a4e10);
const mWood2   = M(0xc8902a);

// Beds
const mBedPink  = M(0xffc0d8);
const mBedBlue  = M(0xb0d8ff);
const mBedFrm   = M(0xf0e0c8);
const mPillow   = M(0xfffcf5);
const mBedRail  = M(0xcccccc);

// Seating — rainbow
const mRed    = M(0xff5252); const mOrange = M(0xff9800);
const mYellow = M(0xfdd835); const mGreen  = M(0x26c6da);
const mBlue   = M(0x42a5f5); const mPurple = M(0xab47bc);
const mTeal   = M(0x26a69a); const mLime   = M(0x9ccc65);

// Medical equipment
const mMon    = M(0x14141e);
const mScrG   = M(0x44ee88, 0x113322);
const mScrB   = M(0x4488ff, 0x001144);
const mScrW   = M(0xeef4ff, 0x111833);
const mWin    = M(0x88c8ee, null, 0.4, THREE.DoubleSide);
const mDoor   = M(0xddaa66, null, 0.65, THREE.DoubleSide);
const mIV     = M(0xd0d0d0);
const mIVbag  = M(0xaae8ff, null, 0.72);
const mScale  = M(0xe8e8e8);
const mSteel  = M(0xcccccc);
const mStlDk  = M(0x888888);
const mPole   = M(0xd0d0d0);
const mToilet = M(0xf5f0ec);
const mSink   = M(0xe8e4d8);

// Medicines (pill bottles, boxes)
const mMed = [
  M(0xff6b9d), M(0x74b9ff), M(0xffd43b), M(0x55efc4),
  M(0xfd79a8), M(0xa29bfe), M(0xff7675), M(0x81ecec)
];

// Decorative / wall paint zones
const mZoneBlue  = M(0xe4f0ff);
const mZoneGreen = M(0xe2fff4);
const mZonePink  = M(0xffe8f4);
const mZoneYellow= M(0xfffbe6);
const mZoneOrange= M(0xfff0e0);
const mCross     = M(0xff2255, 0x660011);

// Toys
const mToyR = M(0xff4422); const mToyG = M(0x22cc55);
const mToyB = M(0x3388ff); const mToyY = M(0xffd740);
const mToyP = M(0xcc44ee); const mToyO = M(0xff8833);
const mToyC = M(0x22ccee); const mToyW = M(0xffffff);
const mToyGd= M(0x8B5E1A);

// Puzzle mat tiles
const pMats = [
  M(0xff6b9d), M(0xff9f43), M(0xffd43b), M(0x69db7c),
  M(0x74c0fc), M(0xda77f2), M(0xff8787), M(0x63e6be),
  M(0xffb3c6), M(0xfdcb6e), M(0xfd79a8), M(0xa29bfe)
];

// ── PRIMITIVES ───────────────────────────────────────────────
const add = m => { m.castShadow = true; m.receiveShadow = true; scene.add(m); return m; };
const box = (w,h,d, mat, x,y,z, ry=0) => {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
  m.position.set(x,y,z); if (ry) m.rotation.y = ry; return add(m);
};
const cyl = (rt,rb,h, mat, x,y,z, seg=16) => {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg), mat);
  m.position.set(x,y,z); return add(m);
};
const sph = (r, mat, x,y,z, seg=12) => {
  const m = new THREE.Mesh(new THREE.SphereGeometry(r,seg,seg), mat);
  m.position.set(x,y,z); return add(m);
};
function ceilLamp(x, z) {
  box(0.72, 0.06, 0.72, M(0xffffff, 0x888866), x, 3.22, z);
  const p = new THREE.PointLight(0xfffcee, 0.42, 7); p.position.set(x,3.0,z); scene.add(p);
}

const WH = 3.3, WT = 0.16;

// ════════════════════════════════════════════════════════════
//  FLOOR — warm white with tile grid
// ════════════════════════════════════════════════════════════
box(10, 0.12, 7, mFloor, 0,0,0);
const tlm = new THREE.LineBasicMaterial({color: 0x88ccdd, opacity: 0.22, transparent: true});
for (let x=-4.8; x<=4.8; x+=0.6) {
  const g = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x,0.063,-3.5), new THREE.Vector3(x,0.063,3.5)]);
  scene.add(new THREE.Line(g,tlm));
}
for (let z=-3.5; z<=3.5; z+=0.6) {
  const g = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-5,0.063,z), new THREE.Vector3(5,0.063,z)]);
  scene.add(new THREE.Line(g,tlm));
}

// ════════════════════════════════════════════════════════════
//  WALLS — painted zone colors
// ════════════════════════════════════════════════════════════
// Pink baseboards everywhere
box(10,0.09,0.04, mBase, 0,0.045,-3.5);
box(10,0.09,0.04, mBase, 0,0.045, 3.5);
box(0.04,0.09,7,  mBase,-5,0.045,0);
box(0.04,0.09,7,  mBase, 5,0.045,0);

// Outer walls — full height
box(3.2,WH,WT,  mWall, -3.4,WH/2, 3.5+WT/2);  // front-left
box(3.2,WH,WT,  mWall,  3.4,WH/2, 3.5+WT/2);  // front-right
box(10,0.5,WT,  mWall,  0,WH-0.25, 3.5+WT/2); // lintel
box(10,WH,WT,   mWall,  0,WH/2,-3.5-WT/2);    // back
box(WT,WH,7,    mWall, -5-WT/2,WH/2,0);       // left
box(WT,WH,7,    mWall,  5+WT/2,WH/2,0);       // right

// Zone color wainscot panels (h=1.1m)
box(0.03,1.1,3.8, mZoneBlue,  -4.96,0.55,-1.5); // left wall (nursing) — soft blue
box(0.03,1.1,3.8, mZoneGreen,  4.96,0.55,-1.5); // right wall (eval) — soft green
box(10,  1.1,0.03,mZonePink,   0,0.55,-3.49);   // back wall — blush
box(3.2, 1.1,0.03,mZoneYellow,-3.4,0.55, 3.49); // front left — warm yellow
box(3.2, 1.1,0.03,mZoneOrange, 3.4,0.55, 3.49); // front right — peach

// Wainscot top stripe
box(10,0.04,0.03,   M(0xff88bb), 0,1.12,-3.48);
box(10,0.04,0.03,   M(0xff88bb), 0,1.12, 3.48);
box(0.03,0.04,7,    M(0x77aaff),-4.96,1.12,0);
box(0.03,0.04,7,    M(0x55cc88), 4.96,1.12,0);

// Internal divider wall
box(WT,WH,3.8, mWallI, 0.1,WH/2,-1.6);

// Bathroom walls
box(1.6,WH,WT, M(0xeaf4ff),-4.2,WH/2, 1.0);
box(WT,WH,2.5, M(0xeaf4ff),-3.4,WH/2, 2.25);
box(1.6,WH,WT, M(0xffe8f4), 4.2,WH/2, 1.0);
box(WT,WH,2.5, M(0xffe8f4), 3.4,WH/2, 2.25);

// ════════════════════════════════════════════════════════════
//  CEILING & ROOF
// ════════════════════════════════════════════════════════════
const ceilMesh = box(10,0.1,7, mCeil, 0,WH+0.05,0);
const roofG = new THREE.Group();
const rm = new THREE.Mesh(new THREE.BoxGeometry(10.6,0.14,7.6), mRoof);
rm.position.set(0,WH+0.18,0); roofG.add(rm); scene.add(roofG);

// Ceiling lamps grid
[[-3.2,-2.5],[-3.2,0.0],[-3.2,2.2],
 [ 0.0,-2.5],[ 0.0,0.0],[ 0.0,2.2],
 [ 3.2,-2.5],[ 3.2,0.0],[ 3.2,2.2]].forEach(([x,z])=>ceilLamp(x,z));

// ── FESTIVE STRING LIGHTS along the top of waiting area ──
for (let i=0; i<18; i++) {
  const cols=[0xff6b9d,0xffd43b,0x74c0fc,0x69db7c,0xff9f43,0xda77f2];
  const x=-4.6+i*0.54, z=2.9+Math.sin(i*0.7)*0.14;
  const lm = new THREE.Mesh(new THREE.SphereGeometry(0.055,6,6), M(cols[i%6],cols[i%6]));
  lm.position.set(x,3.05,z); scene.add(lm);
}

// ── HANGING BALLOONS (clusters) ──
function balloon(x,y,z,col) {
  sph(0.17, M(col,null,0.88), x,y,z, 10);
  cyl(0.005,0.005,0.4, M(col), x,y-0.37,z, 4);
}
[[-4.4,3.08,-0.9,0xff6b9d],[-4.1,3.12,-0.65,0xffd43b],[-3.8,3.08,-0.9,0x74c0fc],
 [ 4.4,3.08,-0.9,0x69db7c],[ 4.1,3.12,-0.65,0xda77f2],[ 4.4,3.08,-0.4,0xff9f43],
 [ 0.6,3.1,  2.5,0xff6b9d],[ 0.0,3.14, 2.5,0xffd43b],[-0.6,3.08, 2.5,0x74c0fc]].forEach(a=>balloon(...a));

// ════════════════════════════════════════════════════════════
//  WINDOWS & DOORS
// ════════════════════════════════════════════════════════════
box(1.2,1.05,0.05, mWin,-3.2,WH-0.88,-3.5);
box(1.4,0.07,0.2,  mCab,-3.2,WH-0.4,-3.5);
box(1.2,1.05,0.05, mWin, 3.2,WH-0.88,-3.5);
box(1.4,0.07,0.2,  mCab, 3.2,WH-0.4,-3.5);
// Window frames — colorful
box(0.045,1.08,0.065, M(0xff88bb),-3.2,WH-0.88,-3.5);
box(0.045,1.08,0.065, M(0x88ccff), 3.2,WH-0.88,-3.5);
// Side windows
box(0.05,0.95,1.15, mWin,-5,WH-0.98,-2.55);
box(0.05,0.92,0.95, mWin,-5,WH-1.0,  1.85);
box(0.2,0.065,1.18, mCab,-4.94,WH-0.54,-2.55);

// Front double door
box(1.45,2.42,0.05, mDoor,-0.75,1.21,3.54);
box(1.45,2.42,0.05, mDoor, 0.75,1.21,3.54);
box(0.045,0.045,0.13, M(0xffcc00),-0.09,1.18,3.57);
box(0.045,0.045,0.13, M(0xffcc00), 0.09,1.18,3.57);
// Door frame rainbow
box(3.12,0.1,0.1, M(0xff88bb), 0,2.45,3.55);
box(0.1,2.45,0.1, M(0xffd43b),-1.52,1.22,3.55);
box(0.1,2.45,0.1, M(0x74c0fc), 1.52,1.22,3.55);

// Big medical cross
box(0.2,0.65,0.1, mCross,-4.4,2.22,-3.48);
box(0.65,0.2,0.1, mCross,-4.4,2.22,-3.48);
box(0.8,0.8,0.07, M(0xffffff,0x221111,null,0.13),-4.4,2.22,-3.45);
const crossLight=new THREE.PointLight(0xff2255,0.5,2.5); crossLight.position.set(-4.4,2.2,-3.3); scene.add(crossLight);

// ════════════════════════════════════════════════════════════
//  WALL MURALS — painted pediatric animals
// ════════════════════════════════════════════════════════════
// GIRAFFE on back-left wall
sph(0.18, M(0xf5a623),-4.1,2.62,-3.48,8);   // head
cyl(0.06,0.08,0.65, M(0xf5a623),-4.1,2.3,-3.48,8); // neck
sph(0.28, M(0xf5a623),-4.1,1.7,-3.48,10);   // body
[0.05,0.1].forEach(dx=>{  // spots
  sph(0.07,M(0xc27a00),-3.95+dx,1.65,-3.46,6);
  sph(0.06,M(0xc27a00),-4.2+dx,1.8,-3.46,6);
});
// ossicones
cyl(0.02,0.02,0.1,M(0xf5a623),-4.06,2.73,-3.47,4);
cyl(0.02,0.02,0.1,M(0xf5a623),-4.14,2.73,-3.47,4);
// legs
[[-4.18,-0.1],[-4.02,-0.1],[-4.18,0.12],[-4.02,0.12]].forEach(([xi,zi])=>
  cyl(0.035,0.035,0.6,M(0xf5a623),xi,1.15,-3.48+zi,5));

// BIG SUN on back-right wall
cyl(0.28,0.28,0.04, M(0xffd43b), 3.2,2.65,-3.48, 20);
for(let a=0;a<8;a++){const ang=a*Math.PI/4; box(0.38,0.05,0.04,M(0xffd43b),3.2+Math.sin(ang)*0.44,2.65,-3.48+Math.cos(ang)*0.44,ang);}
// sun face
sph(0.04,M(0x333300),3.12,2.68,-3.46,6);
sph(0.04,M(0x333300),3.28,2.68,-3.46,6);
box(0.12,0.025,0.02,M(0xff8800),3.2,2.6,-3.46);

// RAINBOW strips on left-front wall
[0xff6b9d,0xff9f43,0xffd43b,0x69db7c,0x74c0fc,0xa29bfe].forEach((col,i)=>{
  box(2.2,0.055,0.025,M(col),-3.4,1.82-i*0.07,3.49);
});

// STAR stickers scattered on walls
[[3.8,2.1,-3.47],[2.5,1.5,-3.47],[1.0,2.4,-3.47],
 [-4.9,1.8,-0.5],[4.9,1.8,-1.5],[4.9,1.4,-0.2]].forEach(([x,y,z])=>{
  const col=[0xffd43b,0xff6b9d,0x74c0fc,0x69db7c][Math.round(x*3+y)%4];
  box(0.1,0.1,0.025,M(col),x,y,z);
});

// Cloud shapes on right wall
[[4.97,2.4,0.5,0xffffff],[4.97,2.6,0.8,0xeef6ff],[4.97,2.45,1.1,0xffffff]].forEach(([x,y,z,c])=>{
  sph(0.18,M(c),x,y,z,8); sph(0.14,M(c),x,y+0.1,z-0.15,6); sph(0.14,M(c),x,y+0.1,z+0.15,6);
});

// ════════════════════════════════════════════════════════════
//  ZONE OVERLAYS (colored floor zones)
// ════════════════════════════════════════════════════════════
const zo=(w,d,col,x,z,op=0.14)=>{
  const m=new THREE.Mesh(new THREE.PlaneGeometry(w,d),M(col,null,op));
  m.rotation.x=-Math.PI/2; m.position.set(x,0.064,z); scene.add(m);
};
zo(4.8,3.2, 0x4488ff,-2.5,-1.8);  // nursing — blue
zo(4.7,3.2, 0x22cc77, 2.7,-1.8);  // eval — green
zo(2.4,2.4, 0xaa44dd, 1.0, 1.4);  // weight/height — purple

  box(0.68,2.2,0.046,M(0xaad8cc,null,0.7,THREE.DoubleSide),bx,1.1,1.05);
  // ADA grab bar
  box(0.046,0.046,0.48,M(0x999999),bx+side*0.26,0.92,2.97);
}
mkBath(-1); mkBath(1);

// ════════════════════════════════════════════════════════════
//  FLOOR LABELS
// ════════════════════════════════════════════════════════════
function label(text, col, x, z, w=2.5, fs=30){
  const cv=document.createElement('canvas'); cv.width=512; cv.height=128;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='rgba(4,8,18,0.92)';
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(3,3,506,122,18);ctx.fill();}
  else ctx.fillRect(3,3,506,122);
  ctx.strokeStyle=col; ctx.lineWidth=3;
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(3,3,506,122,18);ctx.stroke();}
  else ctx.strokeRect(3,3,506,122);
  ctx.fillStyle=col;
  ctx.font=`800 ${fs}px Segoe UI,Arial,sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(text,256,64);
  const tex=new THREE.CanvasTexture(cv);
  const m=new THREE.Mesh(
    new THREE.PlaneGeometry(w,w*0.25),
    new THREE.MeshBasicMaterial({map:tex,transparent:true,depthWrite:false,side:THREE.DoubleSide})
  );
  m.rotation.x=-Math.PI/2; m.position.set(x,0.066,z); scene.add(m);
}

// ════════════════════════════════════════════════════════════
//  CAMERA CONTROL
// ════════════════════════════════════════════════════════════
let drag=false, rDrag=false, px=0, py=0;
let theta=Math.PI/4, phi=1.02, radius=27, panX=0, panZ=0;
let tTheta=theta, tPhi=phi, tRadius=radius, tPanX=0, tPanZ=0;
const cvs=document.getElementById('c');
cvs.addEventListener('mousedown',e=>{drag=true;rDrag=e.button===2;px=e.clientX;py=e.clientY;});
cvs.addEventListener('contextmenu',e=>e.preventDefault());
window.addEventListener('mouseup',()=>drag=false);
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  const dx=e.clientX-px, dy=e.clientY-py;
  if(rDrag){panX-=dx*0.018;panZ-=dy*0.018;}
  else{theta-=dx*0.007;phi=Math.max(0.12,Math.min(1.52,phi-dy*0.006));}
  px=e.clientX;py=e.clientY;tTheta=theta;tPhi=phi;tPanX=panX;tPanZ=panZ;
});
cvs.addEventListener('wheel',e=>{radius=Math.max(5,Math.min(52,radius+e.deltaY*0.038));tRadius=radius;});

let pt0=0;
cvs.addEventListener('touchstart',e=>{
  if(e.touches.length===1){drag=true;px=e.touches[0].clientX;py=e.touches[0].clientY;}
  if(e.touches.length===2)pt0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
});
cvs.addEventListener('touchend',()=>drag=false);
cvs.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&drag){
    const dx=e.touches[0].clientX-px,dy=e.touches[0].clientY-py;
    theta-=dx*0.009;phi=Math.max(0.12,Math.min(1.52,phi-dy*0.007));
    px=e.touches[0].clientX;py=e.touches[0].clientY;tTheta=theta;tPhi=phi;
  }
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    radius=Math.max(5,Math.min(52,radius-(d-pt0)*0.1));tRadius=radius;pt0=d;
  }
},{passive:false});

const viewPresets={
  iso: [Math.PI/4, 1.02, 27, 0, 0],
  top: [0, 0.08, 30, 0, 0],
  fr:  [0, 0.55, 23, 0, 0],
  sd:  [Math.PI/2, 0.55, 23, 0, 0],
  enf: [Math.PI*0.62, 0.72, 15, -2.5, -1.5],
  eval:[Math.PI*0.12, 0.72, 15,  2.5, -1.8],
};
function setView(k,btn){
  const[t,p,r,px2,pz2]=viewPresets[k];
  tTheta=t;tPhi=p;tRadius=r;tPanX=px2;tPanZ=pz2;
  document.querySelectorAll('.vb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}
let roofOn=true;
function toggleRoof(){
  roofOn=!roofOn; roofG.visible=roofOn; ceilMesh.visible=roofOn;
  document.getElementById('roofBtn').textContent=roofOn?'Techo OFF':'Techo ON';
}

// ════════════════════════════════════════════════════════════
//  ANIMATION LOOP
// ════════════════════════════════════════════════════════════
let t=0;
function animate(){
  requestAnimationFrame(animate);
  t+=0.016;
  // Exam lamp gentle pulse
  examLamp.intensity=0.6+Math.sin(t*1.1)*0.06;
  // Cross glow pulse
  crossLight.intensity=0.4+Math.sin(t*2.2)*0.15;
  // Ceiling festoon light twinkle
  ptL.intensity=0.55+Math.sin(t*0.9+1)*0.08;
  ptR.intensity=0.45+Math.sin(t*1.3+2)*0.07;
  // Screen flicker on monitors
  if(mScrG.emissive) mScrG.emissive.setHex(0x113322+(Math.sin(t*3.1)>0.97?0x010100:0));
  // Camera lerp
  theta+=(tTheta-theta)*0.1; phi+=(tPhi-phi)*0.1;
  radius+=(tRadius-radius)*0.1; panX+=(tPanX-panX)*0.1; panZ+=(tPanZ-panZ)*0.1;
  camera.position.x=panX+radius*Math.sin(theta)*Math.sin(phi);
  camera.position.y=radius*Math.cos(phi);
  camera.position.z=panZ+radius*Math.cos(theta)*Math.sin(phi);
  camera.lookAt(panX,1.2,panZ);
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

setTimeout(()=>{
  const l=document.getElementById('ld');
  l.style.transition='opacity .8s'; l.style.opacity=0;
  setTimeout(()=>l.style.display='none',820);
},3200);
